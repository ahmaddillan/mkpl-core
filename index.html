<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TaskFlow</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>TaskFlow</h1>
    <p class="subtitle">Mini app untuk simulasi Git branching strategy.</p>
    <!-- mode development aktif -->

    <section class="task-form">
      <input id="taskInput" type="text" placeholder="Tulis tugas baru">
      <button onclick="addTask()">Tambah</button>
    </section>

    <p id="summary">0 tugas</p>
    <ul id="taskList"></ul>
  </main>
  <script src="app.js"></script>
</body>
</html>
